# filename: .github/workflows/ci.yml
# purpose:  Run the pytest suite (auth, drift, dash_app) on push/PR using a
#           torch/transformers/spaCy-free dependency subset.
# version:  1.0

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Run flake8
        run: python -m flake8

      - name: Run pytest
        run: python -m pytest tests/ -v
