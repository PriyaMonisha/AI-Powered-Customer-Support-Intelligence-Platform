# filename: monitoring/configs/prometheus.yml
# purpose:  Prometheus scrape config for the CSIP FastAPI /metrics endpoint
# version:  1.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
      timeout: 10s
      api_version: v2

scrape_configs:
  - job_name: csip-api
    metrics_path: /metrics
    static_configs:
      # "fastapi" is the Docker Compose service name (Section 14).
      # For local smoke-testing outside Docker, point this at localhost:8000 instead.
      - targets: ["fastapi:8000"]
