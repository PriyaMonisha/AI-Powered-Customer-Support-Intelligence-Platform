# filename: monitoring/configs/alertmanager.yml
# purpose:  Alertmanager routing/receiver config for the 5 CSIP Prometheus alert
#           rules (monitoring/configs/alert_rules.yml).
#
# Alertmanager does not support environment-variable substitution in this file,
# so the Slack webhook URL below is a placeholder. To enable real notifications:
#   1. Create a Slack incoming webhook: https://api.slack.com/messaging/webhooks
#   2. Replace the api_url under 'slack-notifications' with the real URL
#   3. docker compose restart alertmanager
# Until step 2 is done, critical alerts are visible only in the Alertmanager UI
# (localhost:9093) and delivery to 'slack-notifications' will fail (logged, non-fatal).
global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match: { severity: critical }
      receiver: 'slack-notifications'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # No integrations — alerts visible in Alertmanager UI (localhost:9093),
    # not forwarded externally.

  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#csip-alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
